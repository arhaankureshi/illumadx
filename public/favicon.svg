<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark rounded square background -->
  <rect width="64" height="64" rx="14" fill="#05080F"/>
  <!-- Hairline teal border -->
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="#00B4D8" stroke-opacity="0.28" stroke-width="1.5"/>
  <!-- Subtle teal glow -->
  <circle cx="32" cy="34" r="14" fill="#00B4D8" fill-opacity="0.12"/>
  <!-- DX monogram -->
  <text x="50%" y="52%" text-anchor="middle" dominant-baseline="central"
        fill="#00B4D8"
        font-family="'SF Pro Display', -apple-system, system-ui, 'Helvetica Neue', Arial, sans-serif"
        font-weight="900" font-size="30" letter-spacing="-1">DX</text>
</svg>
